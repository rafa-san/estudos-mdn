<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storing the information you need - Test your skills 2</title>
  <link rel="stylesheet" href="../../style/main.css">

<body>
  <h1>Storing the information you need</h1>

  <h2>Test your skills 2: Variables</h2>

  <h2>Variables 2</h2>

  <p>In this task you need to add a new line to correct the value stored in the existing <code>myName</code> variable to your own name.</p>

  <div class="exemplo">
    <pre>
      // Add your code here
      let myName = 'Paul';
    </pre>
  </div>

  <div class="atividade">
    <section class="preview"></section>
  </div>


  <script>
    // Add your code here
    let myName = 'Paul';
    myName = 'Rafael';

    // Don't edit the code below here!
    const section = document.querySelector('section');

    const para = document.createElement('p');
    para.textContent = myName;
    section.appendChild(para);
  </script>
</body>
