  <h1>Variables 3</h1>
  <p>The final task for now — in this case you are provided with some existing code, which has two errors present in it. The results panel should be outputting the name Chris, and a statement about how old Chris will be in 20 years' time. How can you fix the problem and correct the output?</p>
  <hr>
  <section></section>

  <script>
    // Add your code here

    let myName = 'Default';
    myName = 'Chris';

    let myAge = 42;

    // Don't edit the code below here!

    const section = document.querySelector('section');

    const para1 = document.createElement('p');
    const para2 = document.createElement('p');
    para1.textContent = myName;
    para2.textContent = `In 20 years, I will be ${myAge + 20}`;
    section.appendChild(para1);
    section.appendChild(para2);
  </script>
