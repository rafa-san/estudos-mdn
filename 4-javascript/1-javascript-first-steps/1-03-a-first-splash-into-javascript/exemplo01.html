<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A first splash into JavaScript - Exemplo 01</title>
  <link rel="stylesheet" href="../../../style/main.css">
  <style>
    .ultimoResultado {
      color: white;
      padding: 3px;
    }
  </style>
</head>

<body>
  <h1>A first splash into JavaScript - Exemplo 01</h1>

  <h2>Jogo do Adivinhe os Números</h2>

  <div class="atividade">
    <p>Selecionamos um número aleatório entre 1 e 100. Veja se consegue adivinhar em até <strong>06 tentativas</strong>. Iremos te dizer se o seu palpite está acima ou abaixo do número certo!</p>
    <div class="form">
      <label for="campoPalpite">Digite seu palpite: </label>
      <input type="text" id="campoPalpite" class="campoPalpite">
      <input type="submit" value="Enviar palpite" class="envioPalpite">
    </div>
    
    <div class="resultadoParas">
      <p class="palpites"></p>
      <p class="ultimoResultado"></p>
      <p class="baixoOuAlto"></p>
    </div>
  </div>

  <script src="js01.js"></script>
</body>

</html>
