<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What is JavaScript? - Exemplo 02</title>
  <link rel="stylesheet" href="../../../style/main.css">
</head>

<body>
  <h1>What is JavaScript? - Exemplo 02</h1>

  <div class="atividade">
    <h2>Criar parágrafos - Exemplo 1</h2>
    <button class="exemplo">Primeiro Botão</button>

    <h2>Criar parágrafos - Exemplo 2</h2>
    <p>Mesma funcionalidade do exemplo 1, mas com um código que "polui" o HTML</p>
    <button onclick="paragrafoBotao2()">Segundo Botão</button>
  </div>
  
  <script>
    // Botão 1
    function criarParagrafo() {
      let para = document.createElement('p');
      para.textContent = 'Você clicou no primeiro botão!';
      document.body.appendChild(para);
    }

    const botoes = document.querySelectorAll('.exemplo');
    
    for (var i = 0; i < botoes.length; i++) {
      botoes[i].addEventListener('click', criarParagrafo)
    }

    // Segundo exemplo
    function paragrafoBotao2() {
      let para2 = document.createElement('p');
      para2.textContent = 'Você clicou no segundo botão!';
      document.body.appendChild(para2);
    }
  </script>
</body>

</html>
