<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic math in JavaScript - Exemplo 02</title>
  <link rel="stylesheet" href="../../../style/main.css">
</head>

<body>
  <h1>Basic math in JavaScript - Exemplo 02</h1>

  <div class="atividade">
    <h2>Exemplo 009 - A Máquina</h2>
    <p>A máquina está parada.</p>
    <button>Iniciar a máquina</button>
  </div>
  
  <script>
    const btn = document.querySelector('button');
    const txt = document.querySelector('p');

    btn.addEventListener('click', updateBtn);

    function updateBtn() {
      if (btn.textContent === 'Iniciar a máquina') {
        btn.textContent = 'Parar a máquina';
        txt.textContent = 'A máquina iniciou!';
      } else {
        btn.textContent = 'Iniciar a máquina';
        txt.textContent = 'A máquina está parada.'
      }
    }
  </script>
</body>

</html>
