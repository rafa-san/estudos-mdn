<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Useful string methods - Exemplo 01</title>
  <link rel="stylesheet" href="../../../style/main.css">
</head>

<body>
  <h1>Useful string methods - Exemplo 01</h1>
  
  <div class="atividade">
    
  </div>

  <script>
    const browserType = "mozilla";
    console.log(browserType.length); // tamanho
    console.log(browserType[0]); // retorna primeiro caractere
    console.log(browserType[browserType.length - 1]); // retorna último caractere


    if (browserType.includes("zilla")) {  //includes busca uma substring
      console.log("Found zilla!");
    } else {
      console.log("No zilla here!");
    }


    if (browserType.startsWith("zilla")) {
      console.log("Found zilla!");
    } else {
      console.log("No zilla here!");
    }


    if (browserType.endsWith("zilla")) {
      console.log("Found zilla!");
    } else {
      console.log("No zilla here!");
    }


    if (browserType.indexOf("mozilla") === -1) {
      console.log("Caractere não encontrado");
    } else {
      console.log('Caractere encontrado');
    }


    const tagline = "MDN - Resources for developers, by developers";
    console.log(tagline.indexOf("developers")); // 20



    const firstOccurrence = tagline.indexOf("developers");
    const secondOccurrence = tagline.indexOf("developers", firstOccurrence + 1);

    console.log(firstOccurrence);
    console.log(secondOccurrence);


    console.log(browserType);
    console.log(browserType.slice(1, 4)); // "ozi"
    console.log(browserType.slice(2));



    const radData = "My NaMe Is MuD";
    console.log(radData.toLowerCase());
    console.log(radData.toUpperCase());



    const updated = browserType.replace("moz", "van");

    console.log(updated); // "vanilla"
    console.log(browserType); // "mozilla"

    /*
    Note that replace(), like many string methods, doesn't change the string it was called on, but returns a new string. If you want to update the original browserType variable, you would have to do something like this:
    */


    let browserType1 = "mozilla";
    browserType1 = browserType1.replace("moz", "godz");

    console.log(browserType1); // "godzilla"


    let quote = "To be or not to be";
    quote = quote.replaceAll("be", "code");

    console.log(quote); // "To code or not to code"
  </script>
</body>

</html>
