<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Arrays - Silly story generator</title>
  <link rel="stylesheet" href="../../../style/main.css">
  <style>
    label {
        font-weight: bold;
      }

      .atividade div {
        padding-bottom: 20px;
      }

      input[type="text"] {
        padding: 5px;
        width: 150px;
      }

      .atividade p {
        background: #ffc125;
        color: #5e2612;
        padding: 10px;
        visibility: hidden;
      }
  </style>
</head>

<body>
  <h1>Arrays - Silly story generator</h1>

  <p><a href="https://developer.mozilla.org/en-US/docs/Learn/JavaScript/First_steps/Silly_story_generator" target="_blank">Descrição do exercício</a> na página do MDN Web Docs.</p>
  
  <div class="atividade"> 
    <div>
      <label for="customname">Enter custom name:</label>
      <input id="customname" type="text" placeholder="" />
    </div>
    <div>
      <label for="us">US</label
      ><input id="us" type="radio" name="ukus" value="us" checked />
      <label for="uk">UK</label
      ><input id="uk" type="radio" name="ukus" value="uk" />
    </div>
    <div>
      <button class="randomize">Generate random story</button>
    </div>
    <!-- Thanks a lot to Willy Aguirre for his help with the code for this assessment -->
    <p class="story"></p>
  </div>

  <script src="silly-story.js"></script>
</body>

</html>
