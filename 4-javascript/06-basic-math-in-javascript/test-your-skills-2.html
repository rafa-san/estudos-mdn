<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic math in JavaScript - Test your skills 2</title>
  <link rel="stylesheet" href="../../style/main.css">
</head>

<body>
  <h1>Basic math in JavaScript - Test your skills 2</h1>

  <h2>Math 2</h2>

  <div class="atividade">
    <section class="preview"></section>
  </div>

  <script>
    // Final result should be 10.42
    // Add/update your code here

    let result = (7 + 13) / (9 + 7);
    let result2 = 100 / (2 * 6);
    result = result * result2;

    let finalResult = result.toFixed(2);
    console.log(typeof finalResult);

    let finalNumber = Number(finalResult);
    console.log(typeof finalNumber);

    // Don't edit the code below here!
    const section = document.querySelector('section');

    const para1 = document.createElement('p');
    para1.textContent = `Your finalResult is ${ finalResult }`;
    const para2 = document.createElement('p');
    const finalNumberCheck = isNaN(finalNumber) === false ? 'finalNumber is a number type. Well done!' : `Ooops! finalNumber is not a number.`;
    para2.textContent = finalNumberCheck;

    section.appendChild(para1);
    section.appendChild(para2);
  </script>
</body>

</html>
