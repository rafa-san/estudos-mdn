<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <title>Exemplo 006</title>
  <style>
    html {
      font-family: sans-serif;
    }
    body {
      width: 50%;
      max-width: 800px;
      min-width: 480px;
      margin: 0 auto;
    }
    .ultimoResultado {
      color: white;
      padding: 3px;
    }
  </style>
</head>

<body>
  <h1>Exemplo 01 - Jogo do Adivinhe os Números</h1>
  <p>Selecionamos um número aleatório entre 1 e 100. Veja se consegue adivinhar em até 10 tentativas. Iremos te dizer se o seu palpite está acima ou abaixo do número certo!</p>

  <div class="form">
    <label for="campoPalpite">Digite seu palpite: </label>
    <input type="text" id="campoPalpite" class="campoPalpite">
    <input type="submit" value="Enviar palpite" class="envioPalpite">
  </div>
  
  <div class="resultadoParas">
    <p class="palpites"></p>
    <p class="ultimoResultado"></p>
    <p class="baixoOuAlto"></p>
  </div>

  <script src="assets/js01.js"></script>
</body>

</html>
