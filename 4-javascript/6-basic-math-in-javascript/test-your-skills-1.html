<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic math in JavaScript - Test your skills 1</title>
  <link rel="stylesheet" href="../../style/main.css">
</head>

<body>
  <h1>Basic math in JavaScript - Test your skills 1</h1>

  <h2>Math 1</h2>

  <div class="atividade">
    <section class="preview"></section>
  </div>

  <script>
    let finalResult;
    let evenOddResult;
    
    // Add your code here
    let num1 = 5;
    let num2 = 3;
    let num3 = 10;
    let num4 = 4;
    
    let soma = num1 + num2;
    let subtracao = num3 - num4;
    
    finalResult = soma * subtracao;
    
    evenOddResult = finalResult % 2;
    
    const section = document.querySelector('section');
    
    const para1 = document.createElement('p');
    const finalResultCheck = finalResult === 48 ? `Yes, well done!` : `No, it is ${ finalResult }`;
    para1.textContent = `Is the finalResult 48? ${ finalResultCheck }`;
    
    const para2 = document.createElement('p');
    const evenOddResultCheck = evenOddResult === 0 ? 'The final result is even!' : 'The final result is odd. Hrm.'
    para2.textContent = evenOddResultCheck;
    
    section.appendChild(para1);
    section.appendChild(para2);
  </script>
</body>

</html>
