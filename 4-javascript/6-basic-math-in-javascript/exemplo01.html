<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Math in JavaScript</title>
</head>

<body>
  <h1>Basic Math in JavaScript</h1>

  <script>
    const myInt = 5;
    const myFloat = 6.665;
    console.log(myInt);
    console.log(typeof myInt);
    console.log(myFloat);

    const lotsOfDecimal = 1.23456789;
    console.log(lotsOfDecimal);
    const twoDecimalPlaces = lotsOfDecimal.toFixed(2);
    console.log(twoDecimalPlaces)

    let myNumber = '74';
    console.log(myNumber += 3);
    console.log(Number(myNumber) + 3);

    let num1 = 4;
    console.log(num1++);
    console.log(num1);
    console.log(++num1); // aqui ele já mostra o número incrementado

    let x = 3; // x contains the value 3
    let y = 4; // y contains the value 4
    //x *= y; // x now contains the value 12
    console.log(x *= y);

  </script>
</body>

</html>
