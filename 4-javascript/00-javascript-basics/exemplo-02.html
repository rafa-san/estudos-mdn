<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Basics - Exemplo 002</title>
</head>

<body>
  <h2>Exemplo 002 - Evento: Pare de me cutucar (Stop poking me!)</h2>

  <script>
    // Exemplo 2
    document.querySelector('html').onclick = function () {
      alert('Ai! pare de me cutucar!');
    }

    /*
    Aqui selecionamos o elemento <html>, definindo sua propriedade onclick igual a uma função anônima (ou seja, sem nome), que contém o código que queremos que o evento onclick execute.

    Observe que:

    document.querySelector('html').onclick = function() {};

    é equivalente a

    let meuHTML = document.querySelector('html');
    meuHTML.onclick = function() {};

    É só uma maneira mais curta de escrever.
    */

    /*
    There's an alternative way of writing anonymous functions, which we call an arrow function. An arrow function uses () => instead of function ():

    document.querySelector('html').addEventListener('click', () => {
      alert('Ouch! Stop poking me!');
    });
    */
  </script>
</body>

</html>
